<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Derivative thermal protection demo</title>
<style>
  :root{
    --bg:#faf9f5; --surface:#fff; --text:#1a1a18; --muted:#6b6a64;
    --border:rgba(0,0,0,.12); --danger:#c0392b; --success:#0f7a56; --grid:rgba(0,0,0,.06);
    --accent:#0f7a56;
  }
  @media (prefers-color-scheme: dark){
    :root{--bg:#1f1e1b;--surface:#2a2926;--text:#ece9e0;--muted:#a3a199;
          --border:rgba(255,255,255,.14);--danger:#e57373;--success:#5dcaa5;--grid:rgba(255,255,255,.08);--accent:#5dcaa5;}
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);
       font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
       line-height:1.7;padding:24px}
  .container{max-width:820px;margin:0 auto}
  .topbar{display:flex;justify-content:space-between;align-items:flex-start;gap:16px}
  h1{font-size:22px;font-weight:600;margin:0 0 4px}
  .sub{color:var(--muted);font-size:14px;margin:0 0 20px}
  .langbtn{flex-shrink:0;background:var(--surface);border:.5px solid var(--border);color:var(--text);
       border-radius:999px;padding:7px 16px;font-size:13px;cursor:pointer;transition:all .15s;white-space:nowrap}
  .langbtn:hover{border-color:var(--accent);color:var(--accent)}
  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin:0 0 18px}
  .card{background:var(--surface);border:.5px solid var(--border);border-radius:12px;padding:16px}
  .card .lbl{font-size:13px;color:var(--muted);margin:0 0 4px}
  .card .val{font-size:26px;font-weight:600;margin:0}
  .legend{display:flex;flex-wrap:wrap;gap:16px;margin:0 0 10px;font-size:13px;color:var(--muted)}
  .legend span{display:flex;align-items:center;gap:6px}
  .sw{display:inline-block}
  .chartbox{position:relative;width:100%;height:340px;background:var(--surface);
            border:.5px solid var(--border);border-radius:12px;padding:12px}
  .presets{display:flex;flex-wrap:wrap;gap:8px;margin:18px 0 14px}
  .presets button{background:var(--surface);border:.5px solid var(--border);color:var(--text);
       border-radius:999px;padding:7px 16px;font-size:13px;cursor:pointer;transition:all .15s}
  .presets button:hover{border-color:var(--accent);color:var(--accent)}
  .presets button.active{background:var(--accent);border-color:var(--accent);color:#fff}
  .panel{background:var(--surface);border:.5px solid var(--border);border-radius:12px;padding:18px 20px;margin-top:4px}
  .row{display:grid;grid-template-columns:200px 1fr 80px;align-items:center;gap:14px;margin:0 0 14px}
  .row:last-child{margin-bottom:0}
  .row label{font-size:14px;color:var(--text)}
  .row label small{color:var(--muted);font-size:12px;display:block;line-height:1.3}
  .row .out{font-size:14px;font-weight:600;text-align:right}
  input[type=range]{width:100%;accent-color:var(--accent)}
  .note{margin-top:20px;font-size:13px;color:var(--muted);line-height:1.8}
  .note b{color:var(--text);font-weight:600}
  @media(max-width:560px){.row{grid-template-columns:120px 1fr 60px;gap:10px}}
</style>
</head>
<body>
<div class="container">
  <div class="topbar">
    <div>
      <h1 id="t-title"></h1>
      <p class="sub" id="t-sub"></p>
    </div>
    <button class="langbtn" id="langBtn"></button>
  </div>

  <div class="cards">
    <div class="card"><p class="lbl" id="t-c1"></p><p class="val" id="absPeak" style="color:var(--danger)">—</p></div>
    <div class="card"><p class="lbl" id="t-c2"></p><p class="val" id="derPeak" style="color:var(--success)">—</p></div>
    <div class="card"><p class="lbl" id="t-c3"></p><p class="val" id="lead">—</p></div>
  </div>

  <div class="legend">
    <span><span class="sw" style="width:16px;height:3px;border-radius:2px;background:#c0392b"></span><span id="t-l1"></span></span>
    <span><span class="sw" style="width:16px;height:3px;border-radius:2px;background:#0f7a56"></span><span id="t-l2"></span></span>
    <span><span class="sw" style="width:16px;height:0;border-top:2px dashed #8a8a82"></span><span id="t-l3"></span></span>
    <span><span class="sw" style="width:16px;height:0;border-top:2px dashed #c0392b"></span><span id="t-l4"></span></span>
  </div>

  <div class="chartbox"><canvas id="chart"></canvas></div>

  <div class="presets">
    <button data-preset="ideal" id="t-p1"></button>
    <button data-preset="pump50" id="t-p2"></button>
    <button data-preset="pump25" id="t-p3"></button>
    <button data-preset="nocoolant" id="t-p4" class="active"></button>
    <button data-preset="hpcu" id="t-p5"></button>
  </div>

  <div class="panel">
    <div class="row">
      <label id="t-r1"></label>
      <input type="range" id="tau" min="0" max="80" value="60" step="2">
      <span class="out" id="tauOut">60 s</span>
    </div>
    <div class="row">
      <label id="t-r2"></label>
      <input type="range" id="rth" min="0.2" max="2.0" value="1.2" step="0.05">
      <span class="out" id="rthOut">1.20</span>
    </div>
    <div class="row">
      <label id="t-r3"></label>
      <input type="range" id="pmax" min="500" max="3000" value="1500" step="50">
      <span class="out" id="pmaxOut">1500 W</span>
    </div>
    <div class="row">
      <label id="t-r4"></label>
      <input type="range" id="ttrip" min="85" max="200" value="175" step="5">
      <span class="out" id="ttripOut">175 °C</span>
    </div>
    <div class="row">
      <label id="t-r5"></label>
      <input type="range" id="dth" min="0.1" max="1.0" value="0.4" step="0.05">
      <span class="out" id="dthOut">0.40 °C/s</span>
    </div>
    <div class="row">
      <label id="t-r6"></label>
      <input type="range" id="t0" min="0" max="60" value="25" step="5">
      <span class="out" id="t0Out">25 °C</span>
    </div>
  </div>

  <p class="note" id="t-note"></p>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script>
(function(){
  const I18N = {
    en: {
      langLabel: "中文",
      title: "Derivative thermal protection demo",
      sub: "First-order lumped thermal model · C·dT/dt = P − (T−T₀)/Rₜₕ · all parameters adjustable, with preset cases",
      c1: "Absolute-threshold peak", c2: "Derivative-protection peak", c3: "Derivative head start",
      l1: "Absolute threshold (cut at trip temp)", l2: "Derivative protection (cut on slope)",
      l3: "Trip temperature", l4: "200 °C danger line",
      p1: "Ideal instant cutoff (τ=0)", p2: "50% pump speed (good cooling)", p3: "25% pump speed (poor cooling)",
      p4: "No coolant (worst case)", p5: "HPCU delay (~45s)",
      r1: ["Cutoff delay τ", "From decision to power = 0"],
      r2: ["Cooling resistance Rₜₕ", "Higher = worse cooling (lower pump)"],
      r3: ["Max power Pₘₐₓ", "Power absorbed by brake resistor"],
      r4: ["Abs. trip temperature Tₜᵣᵢₚ", "Threshold for the red strategy"],
      r5: ["Derivative threshold Ṫₜₕ", "Slope threshold for the green strategy"],
      r6: ["Initial temperature T₀", "Ambient / starting temperature"],
      note: "<b>How to read it:</b> the red line waits until temperature climbs to Tₜᵣᵢₚ before cutting; by then the slope is steep, and adding the execution delay τ the temperature overshoots (T_peak ≈ T_trip + Ṫ·τ + thermal inertia). The green line triggers while temperature is still low and the slope just got steep, keeping the peak in the safe zone. Raise Rₜₕ to mimic \"no coolant\", raise τ to mimic \"HPCU detection delay\" — combine the two and the red line is most dangerous, while the green line stays safe thanks to its head start.",
      ds: ["Absolute threshold", "Derivative protection", "Trip temp", "200 °C danger"],
      xtitle: "Time (s)", ytitle: "Temperature (°C)",
      tau:v=>v+" s", rth:v=>v.toFixed(2), pmax:v=>v+" W", ttrip:v=>v+" °C",
      dth:v=>v.toFixed(2)+" °C/s", t0:v=>v+" °C",
      sec:" s", peak:v=>Math.round(v)+" °C", lead:v=>v+" s", dash:"—"
    },
    zh: {
      langLabel: "EN",
      title: "导数温度保护原理演示",
      sub: "一阶集总热模型 · C·dT/dt = P − (T−T₀)/Rₜₕ · 所有参数可调,可切换预设工况",
      c1: "绝对阈值保护 峰值", c2: "导数保护 峰值", c3: "导数提前触发",
      l1: "绝对阈值保护(到触发温度才切)", l2: "导数保护(斜率超阈就切)",
      l3: "触发温度线", l4: "200°C 危险线",
      p1: "理想瞬时切断 (τ=0)", p2: "50% 泵速 (冷却好)", p3: "25% 泵速 (冷却差)",
      p4: "无冷却液 (最坏工况)", p5: "HPCU 延迟 (~45s)",
      r1: ["切断执行延迟 τ", "从决定切断到功率归零"],
      r2: ["冷却热阻 Rₜₕ", "越大=冷却越差(泵速越低)"],
      r3: ["最大功率 Pₘₐₓ", "制动电阻吸收的功率"],
      r4: ["绝对触发温度 Tₜᵣᵢₚ", "红线策略的切断阈值"],
      r5: ["导数阈值 Ṫₜₕ", "绿线策略的斜率阈值"],
      r6: ["起始温度 T₀", "环境/起始温度"],
      note: "<b>怎么看：</b>红线等到温度爬到 Tₜᵣᵢₚ 才决定切断,此时斜率已经很陡,再叠加执行延迟 τ,温度会继续过冲(T_peak ≈ T_trip + Ṫ·τ + 热惯性)。绿线在温度还低、斜率刚变陡时就触发,峰值始终被压在安全区。把 Rₜₕ 拉大模拟「无冷却液」,τ 拉大模拟「HPCU 检测延迟」——两者叠加时红线最危险,而绿线靠提前量始终安全。",
      ds: ["绝对阈值", "导数保护", "触发温度", "200°C 危险"],
      xtitle: "时间 (s)", ytitle: "温度 (°C)",
      tau:v=>v+" s", rth:v=>v.toFixed(2), pmax:v=>v+" W", ttrip:v=>v+" °C",
      dth:v=>v.toFixed(2)+" °C/s", t0:v=>v+" °C",
      sec:" s", peak:v=>Math.round(v)+" °C", lead:v=>v+" s", dash:"—"
    }
  };

  let lang = "en";
  let L = I18N[lang];

  const dt=2, C=2000, ramp=150, Tmax=400, Danger=200;
  const P_OF = (t,Pmax)=> Pmax*Math.min(1, t/ramp);
  const params = {tau:60, rth:1.2, pmax:1500, ttrip:175, dth:0.4, t0:25};
  const presets = {
    ideal:     {tau:0,  rth:0.6, pmax:1500, ttrip:175, dth:0.4, t0:25},
    pump50:    {tau:30, rth:0.6, pmax:1500, ttrip:175, dth:0.4, t0:25},
    pump25:    {tau:30, rth:1.0, pmax:1500, ttrip:175, dth:0.4, t0:25},
    nocoolant: {tau:60, rth:1.2, pmax:1500, ttrip:175, dth:0.4, t0:25},
    hpcu:      {tau:45, rth:0.8, pmax:1500, ttrip:175, dth:0.4, t0:25}
  };

  function sim(p){
    const time=[], absT=[], derT=[];
    let Ta=p.t0, Td=p.t0, absTrip=-1, derTrip=-1, absPeak=p.t0, derPeak=p.t0;
    for(let t=0; t<=Tmax; t+=dt){
      time.push(t);
      let Pa=P_OF(t,p.pmax); if(absTrip>=0 && t>=absTrip+p.tau) Pa=0;
      Ta = Ta + dt*(Pa-(Ta-p.t0)/p.rth)/C;
      if(absTrip<0 && Ta>=p.ttrip) absTrip=t;
      absT.push(Ta); if(Ta>absPeak) absPeak=Ta;
      let Pd=P_OF(t,p.pmax); if(derTrip>=0 && t>=derTrip+p.tau) Pd=0;
      const sD=(Pd-(Td-p.t0)/p.rth)/C;
      if(derTrip<0 && sD>=p.dth) derTrip=t;
      Td = Td + dt*sD;
      derT.push(Td); if(Td>derPeak) derPeak=Td;
    }
    return {time,absT,derT,absPeak,derPeak,absTrip,derTrip};
  }

  const isDark = matchMedia('(prefers-color-scheme: dark)').matches;
  const axisColor = isDark ? '#a3a199' : '#6b6a64';
  const gridColor = isDark ? 'rgba(255,255,255,.08)' : 'rgba(0,0,0,.06)';
  const init = sim(params);
  const lineDS=(c,arr)=>({data:arr,borderColor:c,borderWidth:2.5,pointRadius:0,tension:0.15,fill:false});

  const chart=new Chart(document.getElementById('chart'),{
    type:'line',
    data:{labels:init.time,datasets:[
      lineDS('#c0392b',init.absT),
      lineDS('#0f7a56',init.derT),
      {data:init.time.map(()=>params.ttrip),borderColor:'#8a8a82',borderWidth:1.5,borderDash:[6,5],pointRadius:0,fill:false},
      {data:init.time.map(()=>Danger),borderColor:'#c0392b',borderWidth:1.5,borderDash:[6,5],pointRadius:0,fill:false}
    ]},
    options:{responsive:true,maintainAspectRatio:false,animation:false,
      plugins:{legend:{display:false},tooltip:{
        callbacks:{title:(i)=>'t = '+i[0].label+' s',
          label:(c)=>L.ds[c.datasetIndex]+': '+Math.round(c.parsed.y)+' °C'}
      }},
      scales:{
        x:{title:{display:true,text:L.xtitle,color:axisColor},ticks:{color:axisColor,maxTicksLimit:8},grid:{color:gridColor}},
        y:{title:{display:true,text:L.ytitle,color:axisColor},min:0,suggestedMax:240,ticks:{color:axisColor},grid:{color:gridColor}}
      }}
  });

  function refresh(){
    const r=sim(params);
    chart.data.datasets[0].data=r.absT;
    chart.data.datasets[1].data=r.derT;
    chart.data.datasets[2].data=r.time.map(()=>params.ttrip);
    chart.update();
    document.getElementById('absPeak').textContent=L.peak(r.absPeak);
    document.getElementById('derPeak').textContent=L.peak(r.derPeak);
    const lead=(r.absTrip>=0 && r.derTrip>=0)?Math.round(r.absTrip-r.derTrip):null;
    document.getElementById('lead').textContent=(lead===null?L.dash:L.lead(lead));
  }

  function applyLang(){
    L = I18N[lang];
    document.documentElement.lang = lang;
    document.getElementById('langBtn').textContent = L.langLabel;
    document.getElementById('t-title').textContent = L.title;
    document.getElementById('t-sub').textContent = L.sub;
    document.getElementById('t-c1').textContent = L.c1;
    document.getElementById('t-c2').textContent = L.c2;
    document.getElementById('t-c3').textContent = L.c3;
    document.getElementById('t-l1').textContent = L.l1;
    document.getElementById('t-l2').textContent = L.l2;
    document.getElementById('t-l3').textContent = L.l3;
    document.getElementById('t-l4').textContent = L.l4;
    document.getElementById('t-p1').textContent = L.p1;
    document.getElementById('t-p2').textContent = L.p2;
    document.getElementById('t-p3').textContent = L.p3;
    document.getElementById('t-p4').textContent = L.p4;
    document.getElementById('t-p5').textContent = L.p5;
    for(let i=1;i<=6;i++){
      const r=L["r"+i];
      document.getElementById("t-r"+i).innerHTML = r[0]+'<small>'+r[1]+'</small>';
    }
    document.getElementById('t-note').innerHTML = L.note;
    // chart axis + tooltip labels
    chart.options.scales.x.title.text = L.xtitle;
    chart.options.scales.y.title.text = L.ytitle;
    // re-render value readouts with current formatter
    document.getElementById('tauOut').textContent=L.tau(params.tau);
    document.getElementById('rthOut').textContent=L.rth(params.rth);
    document.getElementById('pmaxOut').textContent=L.pmax(params.pmax);
    document.getElementById('ttripOut').textContent=L.ttrip(params.ttrip);
    document.getElementById('dthOut').textContent=L.dth(params.dth);
    document.getElementById('t0Out').textContent=L.t0(params.t0);
    refresh();
  }

  const bind=(id,key,fmtKey)=>{
    const el=document.getElementById(id), out=document.getElementById(id+'Out');
    el.addEventListener('input',function(){
      params[key]=+this.value; out.textContent=L[fmtKey](+this.value);
      document.querySelectorAll('.presets button').forEach(b=>b.classList.remove('active'));
      refresh();
    });
  };
  bind('tau','tau','tau');
  bind('rth','rth','rth');
  bind('pmax','pmax','pmax');
  bind('ttrip','ttrip','ttrip');
  bind('dth','dth','dth');
  bind('t0','t0','t0');

  function applyPreset(name){
    const p=presets[name];
    Object.assign(params,p);
    document.getElementById('tau').value=p.tau;   document.getElementById('tauOut').textContent=L.tau(p.tau);
    document.getElementById('rth').value=p.rth;   document.getElementById('rthOut').textContent=L.rth(p.rth);
    document.getElementById('pmax').value=p.pmax; document.getElementById('pmaxOut').textContent=L.pmax(p.pmax);
    document.getElementById('ttrip').value=p.ttrip; document.getElementById('ttripOut').textContent=L.ttrip(p.ttrip);
    document.getElementById('dth').value=p.dth;   document.getElementById('dthOut').textContent=L.dth(p.dth);
    document.getElementById('t0').value=p.t0;     document.getElementById('t0Out').textContent=L.t0(p.t0);
    refresh();
  }
  document.querySelectorAll('.presets button').forEach(b=>{
    b.addEventListener('click',function(){
      document.querySelectorAll('.presets button').forEach(x=>x.classList.remove('active'));
      this.classList.add('active');
      applyPreset(this.dataset.preset);
    });
  });

  document.getElementById('langBtn').addEventListener('click',function(){
    lang = (lang==="en") ? "zh" : "en";
    applyLang();
  });

  applyLang();
})();
</script>
</body>
</html>
