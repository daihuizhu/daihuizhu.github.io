const moatClass = {network:"m-network",cost:"m-cost",switch:"m-switch",brand:"m-brand",scale:"m-scale",ip:"m-ip",reg:"m-reg"};

function render(sector) {
  const list = sector === "all" ? companies : companies.filter(c => c.sector === sector);
  document.getElementById("cards").innerHTML = list.map(c => `
    <div class="card s-${c.sector}">
      <div class="card-header">
        <span class="badge">${c.label}</span>
        <span class="card-name">${c.name}</span>
        <span class="card-ticker">${c.ticker}</span>
      </div>
      <div class="card-biz">${c.biz}</div>
      <div class="moat-row">
        <span class="moat-label">护城河：</span>
        <span class="moat-tags">${c.moats.map((m,i) => `<span class="moat-tag ${moatClass[c.types[i]]}">${m}</span>`).join("")}</span>
      </div>
    </div>
  `).join("");
}

function filter(sector, btn) {
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  btn.classList.add("active");
  render(sector);
}

render("all");
