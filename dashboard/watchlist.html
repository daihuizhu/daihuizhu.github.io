<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Watchlist</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:    #0c0c0e;
  --bg2:   #111114;
  --bg3:   #18181c;
  --bg4:   #1f1f25;
  --line:  rgba(255,255,255,0.06);
  --line2: rgba(255,255,255,0.11);
  --text:  #e2e2da;
  --muted: #52525a;
  --mut2:  #38383f;
  --amber: #d4a843;
  --green: #3ecf6e;
  --red:   #f05a5a;
  --blue:  #5b9cf6;
  --mono:  "IBM Plex Mono", monospace;
  --sans:  "DM Sans", sans-serif;
  --r: 8px;
}

body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 24px 28px 48px;
  font-size: 13px;
}

/* ── Header ──────────────────────────── */
.header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 24px; flex-wrap: wrap; gap: 12px;
}
.header-left { display: flex; align-items: center; gap: 16px; }
.wordmark { font-family: var(--mono); font-size: 13px; letter-spacing: .18em; color: var(--amber); text-transform: uppercase; }
.sep { width: 1px; height: 16px; background: var(--line2); }
.subtitle { font-family: var(--mono); font-size: 10px; letter-spacing: .1em; color: var(--muted); text-transform: uppercase; }
.header-right { display: flex; align-items: center; gap: 8px; }

/* ── Buttons ─────────────────────────── */
.btn {
  font-family: var(--mono); font-size: 9px; letter-spacing: .12em;
  padding: 6px 14px; border-radius: 5px; cursor: pointer;
  text-transform: uppercase; border: 1px solid var(--line2);
  background: var(--bg3); color: var(--muted);
  transition: color .15s, border-color .15s;
}
.btn:hover { color: var(--text); border-color: var(--muted); }
.btn.primary { background: var(--amber); color: var(--bg); border-color: var(--amber); }
.btn.primary:hover { opacity: .88; }

/* ── Live badge ──────────────────────── */
.live {
  display: flex; align-items: center; gap: 6px;
  font-family: var(--mono); font-size: 9px; color: var(--muted);
  background: var(--bg2); border: 1px solid var(--line);
  padding: 5px 10px; border-radius: 99px;
}
.dot { width: 5px; height: 5px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }

/* ── Summary cards ───────────────────── */
.summary-row { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; margin-bottom: 20px; }
.sc { background: var(--bg2); border: 1px solid var(--line); border-radius: var(--r); padding: 14px 16px; }
.sc .lbl { font-family: var(--mono); font-size: 8px; letter-spacing: .18em; color: var(--muted); text-transform: uppercase; margin-bottom: 6px; }
.sc .val { font-family: var(--mono); font-size: 18px; font-weight: 400; letter-spacing: -.02em; line-height: 1; }
.sc .sub { font-family: var(--mono); font-size: 10px; color: var(--muted); margin-top: 4px; }

/* ── Filter bar ──────────────────────── */
.filter-bar { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
.filter-btn {
  font-family: var(--mono); font-size: 9px; letter-spacing: .08em;
  padding: 4px 10px; border-radius: 4px; border: 1px solid var(--line2);
  background: transparent; color: var(--muted); cursor: pointer;
  transition: all .12s; text-transform: uppercase;
}
.filter-btn:hover { color: var(--text); }
.filter-btn.active { background: var(--bg3); color: var(--text); border-color: var(--mut2); }
.filter-sep { width: 1px; height: 20px; background: var(--line2); margin: 0 4px; }

/* ── Main table panel ────────────────── */
.panel { background: var(--bg2); border: 1px solid var(--line); border-radius: var(--r); overflow: hidden; }
.panel-head { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; border-bottom: 1px solid var(--line); }
.panel-title { font-family: var(--mono); font-size: 9px; letter-spacing: .18em; color: var(--muted); text-transform: uppercase; }

.tbl { width: 100%; border-collapse: collapse; }
.tbl th {
  padding: 8px 14px; text-align: left;
  font-family: var(--mono); font-size: 8px; letter-spacing: .14em;
  color: var(--muted); font-weight: 400; text-transform: uppercase;
  border-bottom: 1px solid var(--line);
  white-space: nowrap; cursor: pointer; user-select: none;
}
.tbl th:hover { color: var(--text); }
.tbl th.sorted { color: var(--amber); }
.tbl th:not(:first-child):not(:nth-child(2)) { text-align: right; }
.tbl td {
  padding: 11px 14px; border-bottom: 1px solid var(--line);
  color: var(--text); vertical-align: middle; white-space: nowrap;
}
.tbl td:not(:first-child):not(:nth-child(2)) { text-align: right; }
.tbl tr:last-child td { border-bottom: none; }
.tbl tr { transition: background .1s; cursor: pointer; }
.tbl tr:hover td { background: var(--bg3); }
.tbl tr.hidden { display: none; }

/* ── Ticker chip ─────────────────────── */
.chip {
  display: inline-block; background: var(--bg4);
  border: 1px solid var(--line2); border-radius: 3px;
  padding: 2px 7px; font-family: var(--mono); font-size: 10px;
  color: var(--amber); letter-spacing: .04em;
}

/* ── Badges ──────────────────────────── */
.badge {
  display: inline-flex; align-items: center; gap: 3px;
  font-family: var(--mono); font-size: 9px; padding: 2px 6px;
  border-radius: 99px; white-space: nowrap; letter-spacing: .03em;
}
.badge.up   { background: rgba(62,207,110,.12); color: var(--green); }
.badge.dn   { background: rgba(240,90,90,.12);  color: var(--red); }
.badge.warn { background: rgba(212,168,67,.12); color: var(--amber); }
.badge.info { background: rgba(91,156,246,.12); color: var(--blue); }
.badge.none { background: var(--bg4); color: var(--muted); }

/* ── Conviction stars ────────────────── */
.stars { color: var(--amber); font-size: 10px; letter-spacing: -.5px; }

/* ── Progress bar (dist to entry) ───── */
.dist-bar { display: flex; align-items: center; gap: 6px; justify-content: flex-end; }
.bar-bg { width: 48px; height: 3px; background: var(--bg4); border-radius: 99px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 99px; }

/* ── Sparkline cell ──────────────────── */
.spark-wrap { display: flex; justify-content: flex-end; align-items: center; }

/* ── Detail drawer ───────────────────── */
.drawer {
  display: none;
  background: var(--bg3); border-bottom: 1px solid var(--line);
}
.drawer.open { display: table-row; }
.drawer-inner { padding: 16px 20px; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
.drawer-section h4 { font-family: var(--mono); font-size: 9px; letter-spacing: .14em; color: var(--muted); text-transform: uppercase; margin-bottom: 8px; }
.drawer-row { display: flex; justify-content: space-between; padding: 4px 0; font-family: var(--mono); font-size: 10px; border-bottom: 1px solid var(--line); }
.drawer-row:last-child { border-bottom: none; }
.drawer-key { color: var(--muted); }
.drawer-val { color: var(--text); }

/* ── Colors ──────────────────────────── */
.pos { color: var(--green) !important; }
.neg { color: var(--red)   !important; }
.amb { color: var(--amber) !important; }
.neu { color: var(--text)  !important; }

/* ── Loader ──────────────────────────── */
.loader-row td { text-align: center; padding: 40px; color: var(--muted); font-family: var(--mono); font-size: 11px; }
.spin { display: inline-block; width: 12px; height: 12px; border-radius: 50%; border: 1.5px solid var(--line2); border-top-color: var(--amber); animation: spin .6s linear infinite; margin-right: 6px; vertical-align: middle; }

/* ── Empty / error ───────────────────── */
.empty { padding: 48px; text-align: center; color: var(--muted); font-family: var(--mono); font-size: 11px; line-height: 1.8; }

@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
@keyframes spin  { to{transform:rotate(360deg)} }
@keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }
.row-animate { animation: fadeIn .25s ease both; }
</style>
</head>
<body>

<!-- ── Header ─────────────────────────────── -->
<div class="header">
  <div class="header-left">
    <div class="wordmark">Watchlist</div>
    <div class="sep"></div>
    <div class="subtitle" id="wl-count">— items</div>
  </div>
  <div class="header-right">
    <div class="live"><span class="dot"></span><span id="live-txt">Loading…</span></div>
    <button class="btn" onclick="refresh()">↻ Refresh</button>
  </div>
</div>

<!-- ── Summary cards ──────────────────────── -->
<div class="summary-row">
  <div class="sc"><div class="lbl">Total Items</div><div class="val neu" id="s-total">—</div><div class="sub">in watchlist</div></div>
  <div class="sc"><div class="lbl">Alert Active</div><div class="val amb" id="s-alerts">—</div><div class="sub">price alerts on</div></div>
  <div class="sc"><div class="lbl">Near Entry</div><div class="val pos" id="s-near">—</div><div class="sub">within 3% of target</div></div>
  <div class="sc"><div class="lbl">RSI &lt; 30</div><div class="val" id="s-rsi">—</div><div class="sub">oversold signals</div></div>
</div>

<!-- ── Filter bar ──────────────────────────── -->
<div class="filter-bar">
  <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
  <button class="filter-btn" onclick="setFilter('alert',this)">Alert On</button>
  <button class="filter-btn" onclick="setFilter('near',this)">Near Entry</button>
  <button class="filter-btn" onclick="setFilter('rsi',this)">RSI &lt; 30</button>
  <div class="filter-sep"></div>
  <button class="filter-btn" onclick="setFilter('equity',this)">Equity</button>
  <button class="filter-btn" onclick="setFilter('etf',this)">ETF</button>
  <button class="filter-btn" onclick="setFilter('commodity',this)">Commodity</button>
</div>

<!-- ── Main table ─────────────────────────── -->
<div class="panel">
  <div class="panel-head">
    <div class="panel-title">Holdings Watchlist</div>
    <div style="font-family:var(--mono);font-size:9px;color:var(--muted)" id="updated-at">—</div>
  </div>
  <table class="tbl" id="wl-table">
    <thead>
      <tr>
        <th onclick="sortBy('ticker')">Ticker</th>
        <th onclick="sortBy('name')">Name / Thesis</th>
        <th onclick="sortBy('price')">Price</th>
        <th onclick="sortBy('chg')">Chg%</th>
        <th onclick="sortBy('entry')">Entry</th>
        <th onclick="sortBy('target')">Target</th>
        <th onclick="sortBy('stop')">Stop</th>
        <th onclick="sortBy('dist')">Dist. to Entry</th>
        <th onclick="sortBy('rsi')">RSI14</th>
        <th onclick="sortBy('ma')">vs MA20</th>
        <th onclick="sortBy('conv')">Conv.</th>
        <th>Alert</th>
        <th>Signals</th>
        <th>7D Chart</th>
      </tr>
    </thead>
    <tbody id="wl-body">
      <tr class="loader-row"><td colspan="14"><span class="spin"></span>Loading watchlist…</td></tr>
    </tbody>
  </table>
</div>

<script>
// ══════════════════════════════════════════════════════════════
//  ★  CONFIG — EDIT THESE  ★
// ══════════════════════════════════════════════════════════════
const CFG = {
  // Your Google Sheet ID (from the URL)
  sheetID:   "1n1x9OoKoNByW3TEtYegtR06jnYUGxc66UrHrSnjqrjY",
  sheetName: "Watchlist",

  // Your Cloudflare Worker URL
  workerURL: "https://portfolio-api.dzhu253.workers.dev/",

  // Fallback: if Worker not set up yet, fetch technicals directly
  // Set to true to bypass worker (less data, no technicals)
  directMode: false,
};

// ══════════════════════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════════════════════
let rows = [];          // parsed sheet rows
let enriched = [];      // rows + live price + technicals
let currentFilter = "all";
let sortKey = "conv";
let sortAsc = false;
let openDrawer = null;

// ══════════════════════════════════════════════════════════════
//  BOOT
// ══════════════════════════════════════════════════════════════
async function refresh() {
  setText("live-txt", "Refreshing…");
  document.getElementById("wl-body").innerHTML =
    `<tr class="loader-row"><td colspan="14"><span class="spin"></span>Fetching data…</td></tr>`;

  rows = await fetchSheetRows();
  if (!rows.length) {
    document.getElementById("wl-body").innerHTML =
      `<tr><td colspan="14"><div class="empty">No data in Watchlist sheet.<br>Add rows to your Google Sheet.</div></td></tr>`;
    setText("live-txt", "No data");
    return;
  }

  enriched = await enrichRows(rows);
  renderTable();
  renderSummary();
  setText("live-txt", new Date().toLocaleTimeString("sv-SE", { hour:"2-digit", minute:"2-digit" }));
  setText("updated-at", "Updated " + new Date().toLocaleTimeString("sv-SE"));
  setText("wl-count", enriched.length + " items");
}

window.addEventListener("DOMContentLoaded", refresh);

// ══════════════════════════════════════════════════════════════
//  FETCH GOOGLE SHEET — Watchlist tab
// ══════════════════════════════════════════════════════════════
async function fetchSheetRows() {
  const url = `https://docs.google.com/spreadsheets/d/${CFG.sheetID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(CFG.sheetName)}&range=A:M`;
  try {
    const res  = await fetch(url);
    const text = await res.text();
    const json = JSON.parse(text.replace(/^[^(]+\(/, "").replace(/\);\s*$/, ""));
    const rows = json.table.rows;

    // Your Watchlist columns:
    // A=Ticker, B=Name, C=Type, D=Exchange, E=Currency,
    // F=Current Price (formula), G=Target Entry, H=Target Exit,
    // I=Stop Loss, J=Alert Active, K=Dist to Entry, L=Conviction, M=Thesis

    return rows
      .filter(r => r.c && r.c[0] && r.c[0].v)
      .map(r => {
        const v = i => r.c[i] ? (r.c[i].v ?? "") : "";
        const ticker = String(v(0)).trim();
        if (!ticker || ticker === "Ticker") return null; // skip header

        // Convert GOOGLEFINANCE ticker format to Yahoo: NASDAQ:QQQ → QQQ, CURRENCY:XAGUSD → XAGUSD
        const yahooTicker = toYahooTicker(ticker);

        return {
          ticker,
          yahooTicker,
          name:       String(v(1) || ""),
          type:       String(v(2) || "").toLowerCase(),
          exchange:   String(v(3) || ""),
          currency:   String(v(4) || "USD"),
          sheetPrice: Number(v(5)) || null,
          entry:      Number(v(6)) || null,
          target:     Number(v(7)) || null,
          stop:       Number(v(8)) || null,
          alertActive: String(v(9)).toLowerCase() === "yes" || v(9) === true,
          conviction: String(v(11) || ""),
          thesis:     String(v(12) || ""),
        };
      })
      .filter(Boolean);
  } catch(e) {
    console.error("Sheet fetch error:", e);
    return [];
  }
}

// ── Convert Google Finance ticker to Yahoo Finance ticker ─────
function toYahooTicker(t) {
  // CURRENCY:XAGUSD → SI=F (silver futures) or XAGUSD=X
  // CURRENCY:XAUUSD → GC=F or XAUUSD=X
  // NASDAQ:QQQ → QQQ
  // STO:BOL → BOL.ST
  const map = {
    "CURRENCY:XAGUSD": "SI=F",
    "CURRENCY:XAUUSD": "GC=F",
    "CURRENCY:USDSEK": "USDSEK=X",
    "CURRENCY:USDCNY": "USDCNY=X",
  };
  if (map[t]) return map[t];

  // Strip exchange prefix: NASDAQ:QQQ → QQQ
  if (t.includes(":")) {
    const [exchange, sym] = t.split(":");
    if (exchange === "STO") return sym + ".ST";
    return sym;
  }
  return t;
}

// ══════════════════════════════════════════════════════════════
//  ENRICH — add live price + technicals from Yahoo / Worker
// ══════════════════════════════════════════════════════════════
async function enrichRows(rows) {
  const tickers = [...new Set(rows.map(r => r.yahooTicker))].join(",");

  // Fetch live quotes
  let quotes = {};
  try {
    const res = await fetch(
      `https://query2.finance.yahoo.com/v7/finance/quote?symbols=${encodeURIComponent(tickers)}`,
      { headers: { "User-Agent": "Mozilla/5.0", "Accept": "application/json" } }
    );
    const data = await res.json();
    (data?.quoteResponse?.result || []).forEach(q => {
      quotes[q.symbol] = {
        price:     q.regularMarketPrice,
        change:    q.regularMarketChange,
        changePct: q.regularMarketChangePercent,
        name:      q.shortName || q.longName || "",
        pe:        q.trailingPE,
        high52:    q.fiftyTwoWeekHigh,
        low52:     q.fiftyTwoWeekLow,
      };
    });
  } catch(e) { console.warn("Quote fetch failed:", e); }

  // Fetch technicals + sparklines for each row
  const techResults = await Promise.allSettled(
    rows.map(r => fetchTechnicals(r.yahooTicker))
  );

  return rows.map((r, i) => {
    const q    = quotes[r.yahooTicker] || {};
    const tech = techResults[i].status === "fulfilled" ? techResults[i].value : {};

    const price = q.price || r.sheetPrice || null;
    const dist  = (price && r.entry) ? (price - r.entry) / r.entry : null;
    const profitPct = (price && r.entry) ? (price - r.entry) / r.entry : null;

    return { ...r, price, changePct: q.changePct, change: q.change,
      quoteName: q.name, pe: q.pe, high52: q.high52, low52: q.low52,
      dist, profitPct, ...tech };
  });
}

async function fetchTechnicals(ticker) {
  // Try worker first
  if (CFG.workerURL && !CFG.directMode && !CFG.workerURL.includes("YOUR_WORKER")) {
    try {
      const res = await fetch(`${CFG.workerURL}/technicals?ticker=${ticker}`);
      if (res.ok) return await res.json();
    } catch(e) {}
  }

  // Direct Yahoo Finance fallback
  try {
    const res  = await fetch(
      `https://query2.finance.yahoo.com/v8/finance/chart/${ticker}?range=1mo&interval=1d`,
      { headers: { "User-Agent": "Mozilla/5.0" } }
    );
    const data = await res.json();
    const result = data?.chart?.result?.[0];
    if (!result) return {};

    const closes = (result.indicators?.quote?.[0]?.close || []).filter(v => v != null);
    const ts     = result.timestamp || [];

    const ma20 = sma(closes, 20);
    const ma50 = sma(closes, 50);
    const rsi  = calcRSI(closes, 14);
    const cur  = closes[closes.length - 1];

    // Sparkline: last 7 closes
    const spark = closes.slice(-7).map((c, i) => ({
      c, t: new Date((ts[ts.length - 7 + i] || 0) * 1000).toISOString().split("T")[0]
    }));

    return {
      ma20: round2(ma20), ma50: round2(ma50), rsi14: round2(rsi),
      rsiAlert:    rsi !== null && rsi < 30,
      ma20AboveMa50: ma20 !== null && ma50 !== null && ma20 > ma50,
      crossSignal: detectCross(closes),
      spark,
    };
  } catch(e) { return {}; }
}

// ══════════════════════════════════════════════════════════════
//  MATH
// ══════════════════════════════════════════════════════════════
function sma(arr, n) {
  const s = arr.filter(v=>v!=null).slice(-n);
  return s.length < n ? null : s.reduce((a,b)=>a+b,0)/n;
}
function calcRSI(closes, n=14) {
  const v = closes.filter(v=>v!=null);
  if (v.length < n+1) return null;
  const s = v.slice(-(n+1));
  let g=0,l=0;
  for (let i=1;i<s.length;i++) { const d=s[i]-s[i-1]; if(d>0)g+=d; else l-=d; }
  const ag=g/n, al=l/n;
  return al===0 ? 100 : 100-100/(1+ag/al);
}
function detectCross(closes) {
  const v = closes.filter(v=>v!=null);
  if (v.length < 51) return "none";
  const cur20=sma(v,20), cur50=sma(v,50);
  const pre20=sma(v.slice(0,-1),20), pre50=sma(v.slice(0,-1),50);
  if (pre20<pre50 && cur20>cur50) return "golden_cross";
  if (pre20>pre50 && cur20<cur50) return "death_cross";
  return "none";
}
function round2(v) { return v!=null ? Math.round(v*100)/100 : null; }

// ══════════════════════════════════════════════════════════════
//  RENDER TABLE
// ══════════════════════════════════════════════════════════════
const sparkCharts = {};

function renderTable() {
  // Sort
  const sorted = [...enriched].sort((a, b) => {
    let va = a[sortKey], vb = b[sortKey];
    if (sortKey === "conv") { va = (a.conviction.match(/⭐/g)||[]).length; vb = (b.conviction.match(/⭐/g)||[]).length; }
    if (sortKey === "dist") { va = a.dist ?? 99; vb = b.dist ?? 99; }
    if (typeof va === "string") return sortAsc ? va.localeCompare(vb) : vb.localeCompare(va);
    return sortAsc ? (va||0)-(vb||0) : (vb||0)-(va||0);
  });

  // Filter
  const filtered = sorted.filter(r => {
    if (currentFilter === "alert")     return r.alertActive;
    if (currentFilter === "near")      return r.dist !== null && Math.abs(r.dist) < 0.03;
    if (currentFilter === "rsi")       return r.rsiAlert;
    if (currentFilter === "equity")    return r.type === "equity";
    if (currentFilter === "etf")       return r.type === "etf";
    if (currentFilter === "commodity") return r.type === "commodity";
    return true;
  });

  if (!filtered.length) {
    document.getElementById("wl-body").innerHTML =
      `<tr><td colspan="14"><div class="empty">No items match this filter.</div></td></tr>`;
    return;
  }

  const tbody = document.getElementById("wl-body");
  tbody.innerHTML = "";

  filtered.forEach((r, idx) => {
    const price  = r.price;
    const pChg   = r.changePct;
    const dist   = r.dist;
    const rsi    = r.rsi14;
    const ma20   = r.ma20;

    // Signals
    const signals = [];
    if (r.crossSignal === "golden_cross") signals.push(`<span class="badge up">Golden ✕</span>`);
    if (r.crossSignal === "death_cross")  signals.push(`<span class="badge dn">Death ✕</span>`);
    if (r.rsiAlert)                       signals.push(`<span class="badge warn">RSI&lt;30</span>`);
    if (dist !== null && Math.abs(dist) < 0.03 && dist >= 0) signals.push(`<span class="badge info">Near Entry</span>`);
    if (r.alertActive && price && r.stop && price <= r.stop) signals.push(`<span class="badge dn">Stop Hit</span>`);
    if (!signals.length) signals.push(`<span class="badge none">—</span>`);

    // Distance bar
    const distPct  = dist !== null ? (dist * 100).toFixed(1) + "%" : "—";
    const distCls  = dist !== null ? (dist < 0 ? "pos" : dist < 0.05 ? "amb" : "neg") : "";
    const barWidth = dist !== null ? Math.min(100, Math.abs(dist) * 1000) : 0;
    const barColor = dist !== null && dist < 0 ? "var(--green)" : "var(--amber)";

    // MA distance
    const maDiff  = (price && ma20) ? ((price - ma20) / ma20 * 100).toFixed(1) + "%" : "—";
    const maCls   = (price && ma20) ? (price > ma20 ? "pos" : "neg") : "";

    // Spark canvas id
    const sparkId = `spark-${idx}`;

    const row = document.createElement("tr");
    row.className = "row-animate";
    row.dataset.idx = idx;
    row.dataset.type = r.type;
    row.dataset.alert = r.alertActive ? "1" : "0";
    row.dataset.near  = (dist !== null && Math.abs(dist) < 0.03) ? "1" : "0";
    row.dataset.rsi   = r.rsiAlert ? "1" : "0";

    row.innerHTML = `
      <td><span class="chip">${r.ticker}</span></td>
      <td style="max-width:180px">
        <div style="font-size:12px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${r.name || r.quoteName || r.ticker}</div>
        <div style="font-family:var(--mono);font-size:9px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:170px">${r.thesis}</div>
      </td>
      <td style="font-family:var(--mono)">${fmtNum(price)}</td>
      <td class="${pChg>0?"pos":pChg<0?"neg":""}" style="font-family:var(--mono)">${pChg!=null?(pChg>0?"+":"")+pChg.toFixed(2)+"%":"—"}</td>
      <td style="font-family:var(--mono);color:var(--muted)">${fmtNum(r.entry)}</td>
      <td style="font-family:var(--mono);color:var(--green)">${fmtNum(r.target)}</td>
      <td style="font-family:var(--mono);color:var(--red)">${fmtNum(r.stop)}</td>
      <td>
        <div class="dist-bar">
          <span class="${distCls}" style="font-family:var(--mono);font-size:10px;min-width:45px;text-align:right">${distPct}</span>
          <div class="bar-bg"><div class="bar-fill" style="width:${barWidth}%;background:${barColor}"></div></div>
        </div>
      </td>
      <td class="${r.rsiAlert?"neg":""}" style="font-family:var(--mono)">${rsi!=null?rsi.toFixed(1):"—"}</td>
      <td class="${maCls}" style="font-family:var(--mono)">${maDiff}</td>
      <td><span class="stars">${r.conviction}</span></td>
      <td style="text-align:center">${r.alertActive ? `<span style="font-size:14px">🔔</span>` : `<span style="color:var(--muted);font-size:12px">—</span>`}</td>
      <td>${signals.join(" ")}</td>
      <td><div class="spark-wrap"><canvas id="${sparkId}" width="80" height="32"></canvas></div></td>
    `;

    // Click to expand drawer
    row.addEventListener("click", () => toggleDrawer(row, r, sparkId));
    tbody.appendChild(row);

    // Draw sparkline after row is in DOM
    requestAnimationFrame(() => drawSpark(sparkId, r.spark || []));
  });
}

// ══════════════════════════════════════════════════════════════
//  DRAWER — expanded detail row
// ══════════════════════════════════════════════════════════════
function toggleDrawer(row, r, sparkId) {
  // Remove existing drawer
  const existing = document.querySelector(".drawer.open");
  if (existing) { existing.remove(); openDrawer = null; }

  if (openDrawer === row) { openDrawer = null; return; }
  openDrawer = row;

  const price = r.price;

  const drawer = document.createElement("tr");
  drawer.className = "drawer open";
  drawer.innerHTML = `<td colspan="14">
    <div class="drawer-inner">
      <div class="drawer-section">
        <h4>Price Levels</h4>
        <div class="drawer-row"><span class="drawer-key">Current</span><span class="drawer-val">${fmtNum(price)}</span></div>
        <div class="drawer-row"><span class="drawer-key">Target Entry</span><span class="drawer-val pos">${fmtNum(r.entry)}</span></div>
        <div class="drawer-row"><span class="drawer-key">Target Exit</span><span class="drawer-val pos">${fmtNum(r.target)}</span></div>
        <div class="drawer-row"><span class="drawer-key">Stop Loss</span><span class="drawer-val neg">${fmtNum(r.stop)}</span></div>
        <div class="drawer-row"><span class="drawer-key">52W High</span><span class="drawer-val">${fmtNum(r.high52)}</span></div>
        <div class="drawer-row"><span class="drawer-key">52W Low</span><span class="drawer-val">${fmtNum(r.low52)}</span></div>
      </div>
      <div class="drawer-section">
        <h4>Technicals</h4>
        <div class="drawer-row"><span class="drawer-key">RSI 14</span><span class="drawer-val ${r.rsiAlert?"neg":""}">${r.rsi14!=null?r.rsi14.toFixed(1):"—"}</span></div>
        <div class="drawer-row"><span class="drawer-key">MA 20</span><span class="drawer-val">${fmtNum(r.ma20)}</span></div>
        <div class="drawer-row"><span class="drawer-key">MA 50</span><span class="drawer-val">${fmtNum(r.ma50)}</span></div>
        <div class="drawer-row"><span class="drawer-key">Price vs MA20</span><span class="drawer-val ${r.ma20AboveMa50?"pos":"neg"}">${(price&&r.ma20)?((price-r.ma20)/r.ma20*100).toFixed(2)+"%":"—"}</span></div>
        <div class="drawer-row"><span class="drawer-key">MA Cross</span><span class="drawer-val">${r.crossSignal==="golden_cross"?"🟢 Golden":"r.crossSignal==="death_cross"?"🔴 Death":"—"}</span></div>
        <div class="drawer-row"><span class="drawer-key">P/E</span><span class="drawer-val">${r.pe?r.pe.toFixed(1):"—"}</span></div>
      </div>
      <div class="drawer-section">
        <h4>Info</h4>
        <div class="drawer-row"><span class="drawer-key">Type</span><span class="drawer-val">${r.type}</span></div>
        <div class="drawer-row"><span class="drawer-key">Exchange</span><span class="drawer-val">${r.exchange}</span></div>
        <div class="drawer-row"><span class="drawer-key">Currency</span><span class="drawer-val">${r.currency}</span></div>
        <div class="drawer-row"><span class="drawer-key">Alert</span><span class="drawer-val">${r.alertActive?"🔔 On":"Off"}</span></div>
        <div class="drawer-row"><span class="drawer-key">Conviction</span><span class="drawer-val">${r.conviction}</span></div>
        <div class="drawer-row" style="border:none;padding-top:8px"><span class="drawer-key" style="font-style:italic;color:var(--muted)">${r.thesis}</span></div>
      </div>
    </div>
  </td>`;

  row.after(drawer);
}

// ══════════════════════════════════════════════════════════════
//  SPARKLINE
// ══════════════════════════════════════════════════════════════
function drawSpark(canvasId, data) {
  const canvas = document.getElementById(canvasId);
  if (!canvas || !data.length) return;
  if (sparkCharts[canvasId]) sparkCharts[canvasId].destroy();

  const vals  = data.map(d => d.c);
  const isUp  = vals[vals.length-1] >= vals[0];
  const col   = isUp ? "#3ecf6e" : "#f05a5a";

  sparkCharts[canvasId] = new Chart(canvas, {
    type: "line",
    data: {
      labels: vals.map((_,i)=>i),
      datasets: [{ data: vals, borderColor: col, borderWidth: 1.2,
        pointRadius: 0, fill: false, tension: 0.3 }]
    },
    options: {
      responsive: false, animation: false,
      plugins: { legend:{display:false}, tooltip:{enabled:false} },
      scales: { x:{display:false}, y:{display:false} }
    }
  });
}

// ══════════════════════════════════════════════════════════════
//  SUMMARY CARDS
// ══════════════════════════════════════════════════════════════
function renderSummary() {
  const total  = enriched.length;
  const alerts = enriched.filter(r => r.alertActive).length;
  const near   = enriched.filter(r => r.dist !== null && Math.abs(r.dist) < 0.03).length;
  const rsiCnt = enriched.filter(r => r.rsiAlert).length;

  setText("s-total",  total);
  setText("s-alerts", alerts);
  setText("s-near",   near);
  const rsiEl = document.getElementById("s-rsi");
  rsiEl.textContent = rsiCnt;
  rsiEl.className = "val " + (rsiCnt > 0 ? "neg" : "neu");
}

// ══════════════════════════════════════════════════════════════
//  FILTER + SORT
// ══════════════════════════════════════════════════════════════
function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  renderTable();
}

function sortBy(key) {
  if (sortKey === key) sortAsc = !sortAsc;
  else { sortKey = key; sortAsc = false; }
  document.querySelectorAll(".tbl th").forEach(th => th.classList.remove("sorted"));
  event.target.classList.add("sorted");
  renderTable();
}

// ══════════════════════════════════════════════════════════════
//  HELPERS
// ══════════════════════════════════════════════════════════════
function fmtNum(v, dec=2) {
  if (v==null||isNaN(v)) return "—";
  return Number(v).toLocaleString("en-US",{minimumFractionDigits:dec,maximumFractionDigits:dec});
}
function setText(id, t) { const e=document.getElementById(id); if(e) e.textContent=t; }
</script>
</body>
</html>
